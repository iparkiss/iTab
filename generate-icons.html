<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>iPark New Tab - 아이콘 PNG 변환기</title>
<style>
  body { font-family: sans-serif; background: #111827; color: #e5e7eb; padding: 32px; }
  h2   { color: #60a5fa; }
  .grid { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-end; margin: 24px 0; }
  canvas { border-radius: 8px; box-shadow: 0 4px 16px #0008; display: block; }
  .card  { text-align: center; }
  .card p { margin: 8px 0 4px; font-size: 13px; color: #9ca3af; }
  a.btn  { display: inline-block; margin-top: 8px; padding: 6px 16px;
           background: #3b82f6; color: #fff; border-radius: 6px;
           text-decoration: none; font-size: 13px; }
  a.btn:hover { background: #2563eb; }
  .note { background: #1e293b; border-left: 4px solid #3b82f6;
          padding: 12px 16px; border-radius: 6px; margin-top: 24px;
          font-size: 14px; line-height: 1.7; }
</style>
</head>
<body>
<h2>iPark New Tab — 아이콘 PNG 변환기</h2>
<p>아래 버튼을 클릭해 PNG를 다운로드한 후 <code>icons/</code> 폴더에 저장하세요.</p>

<div class="grid" id="canvasGrid"></div>

<div class="note">
  💡 다운로드 후 파일명을 확인하세요:<br>
  &nbsp;&nbsp;• <code>icon16.png</code> → <code>icons/icon16.png</code><br>
  &nbsp;&nbsp;• <code>icon48.png</code> → <code>icons/icon48.png</code><br>
  &nbsp;&nbsp;• <code>icon128.png</code> → <code>icons/icon128.png</code>
</div>

<script>
const svgSource = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a2a6c"/>
      <stop offset="55%"  stop-color="#2e3d9e"/>
      <stop offset="100%" stop-color="#b92b27"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="10%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#dce8ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="letterGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#00001a" flood-opacity="0.55"/>
    </filter>
    <filter id="iconShadow" x="-15%" y="-10%" width="130%" height="135%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0a0f2e" flood-opacity="0.45"/>
    </filter>
    <clipPath id="roundClip">
      <rect x="4" y="4" width="120" height="120" rx="26" ry="26"/>
    </clipPath>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#bgGrad)" filter="url(#iconShadow)"/>
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#bgGrad)"/>
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#shineGrad)"/>
  <ellipse cx="52" cy="23" rx="38" ry="14" fill="white" opacity="0.13" clip-path="url(#roundClip)"/>
  <rect x="4" y="74" width="120" height="50" fill="#000020" opacity="0.18" clip-path="url(#roundClip)"/>
  <rect x="5" y="5" width="118" height="118" rx="25" fill="none" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>
  <circle cx="64" cy="37" r="8.5" fill="url(#letterGrad)" filter="url(#letterGlow)"/>
  <rect x="57.5" y="52" width="13" height="44" rx="6.5" fill="url(#letterGrad)" filter="url(#letterGlow)"/>
  <rect x="57.5" y="52" width="13" height="8" rx="6.5" fill="white" opacity="0.35" clip-path="url(#roundClip)"/>
</svg>`;

// PWA 설치 품질을 위해 192/512 권장 (필요하면 더 추가 가능)
const sizes = [16, 48, 128, 192, 512];

sizes.forEach(size => {
  const blob = new Blob([svgSource], { type: 'image/svg+xml' });
  const url  = URL.createObjectURL(blob);
  const img  = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width  = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, size, size);

    const card = document.createElement('div');
    card.className = 'card';
    const label = document.createElement('p');
    label.textContent = `${size} × ${size}`;
    const link = document.createElement('a');
    link.className = 'btn';
    link.textContent = `icon${size}.png 다운로드`;
    link.download = `icon${size}.png`;
    link.href = canvas.toDataURL('image/png');
    card.appendChild(canvas);
    card.appendChild(label);
    card.appendChild(link);
    document.getElementById('canvasGrid').appendChild(card);
    URL.revokeObjectURL(url);
  };
  img.src = url;
});
</script>
</body>
</html>
